name: microservices-ci-cd

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/microservices-ci.yml"
      - "pom.xml"
      - "gateway-api/**"
      - "core-service/**"
      - "billing-service/**"
      - "notification-service/**"
      - "reporting-service/**"
      - "user-service/**"
      - "auth-service/**"
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/microservices-ci.yml"
      - "pom.xml"
      - "gateway-api/**"
      - "core-service/**"
      - "billing-service/**"
      - "notification-service/**"
      - "reporting-service/**"
      - "user-service/**"
      - "auth-service/**"
  workflow_dispatch:
    inputs:
      services:
        description: "all ou lista separada por virgula: gateway-api,core-service,..."
        required: false
        default: "all"
        type: string
      target_environment:
        description: "Ambiente de destino para execucao manual"
        required: true
        default: homologacao
        type: choice
        options:
          - homologacao
          - producao

permissions:
  contents: read
  id-token: write

concurrency:
  group: microservices-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      target_environment: ${{ steps.detect.outputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect services
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REQUESTED_SERVICES: ${{ inputs.services }}
          REQUESTED_ENVIRONMENT: ${{ inputs.target_environment }}
        run: |
          set -euo pipefail

          services=(
            gateway-api
            core-service
            billing-service
            notification-service
            reporting-service
            user-service
            auth-service
          )

          selected=()

          select_all() {
            selected=("${services[@]}")
          }

          is_valid_service() {
            local candidate="$1"
            local service

            for service in "${services[@]}"; do
              if [[ "$candidate" == "$service" ]]; then
                return 0
              fi
            done

            return 1
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            requested="${REQUESTED_SERVICES:-all}"

            if [[ -z "$requested" || "$requested" == "all" ]]; then
              select_all
            else
              IFS=',' read -ra requested_items <<< "$requested"

              for raw_item in "${requested_items[@]}"; do
                item="$(echo "$raw_item" | xargs)"

                if [[ -z "$item" ]]; then
                  continue
                fi

                if ! is_valid_service "$item"; then
                  echo "::error::Servico invalido para deploy manual: $item"
                  exit 1
                fi

                selected+=("$item")
              done
            fi
          else
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
            elif [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
            else
              changed_files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
            fi

            if echo "$changed_files" | grep -Eq "^(pom\.xml)$"; then
              select_all
            else
              for service in "${services[@]}"; do
                if echo "$changed_files" | grep -q "^${service}/"; then
                  selected+=("$service")
                fi
              done
            fi
          fi

          declare -A seen=()
          unique=()

          for service in "${selected[@]}"; do
            if [[ -z "${seen[$service]:-}" ]]; then
              unique+=("$service")
              seen[$service]=1
            fi
          done

          services_json="["

          for service in "${unique[@]}"; do
            if [[ "$services_json" != "[" ]]; then
              services_json+=","
            fi

            services_json+="\"$service\""
          done

          services_json+="]"

          if [[ "${#unique[@]}" -gt 0 ]]; then
            has_changes=true
            echo "Servicos selecionados: ${unique[*]}"
          else
            has_changes=false
            echo "Nenhum microservice alterado."
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            target_environment="$REQUESTED_ENVIRONMENT"
          elif [[ "$REF_NAME" == "main" ]]; then
            target_environment="producao"
          elif [[ "$REF_NAME" == "develop" ]]; then
            target_environment="homologacao"
          else
            target_environment="ci"
          fi

          {
            echo "services=$services_json"
            echo "has_changes=$has_changes"
            echo "target_environment=$target_environment"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify ${{ matrix.service }}
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Verify service
        run: ./mvnw -B -ntp verify

      - name: Build container image
        run: docker build --build-arg SWAGGER_UI_ENABLED=false -f src/main/docker/Dockerfile.jvm -t brasaller/${{ matrix.service }}:${{ github.sha }} .

  deploy:
    name: Deploy ${{ matrix.service }}
    needs:
      - detect
      - verify
    if: >-
      github.event_name != 'pull_request' &&
      needs.detect.outputs.has_changes == 'true' &&
      (github.ref_name == 'main' || github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ${{ needs.detect.outputs.target_environment }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps CLI
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade

      - name: Build and push image to ACR
        env:
          ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
          SWAGGER_UI_ENABLED: ${{ vars.SWAGGER_UI_ENABLED }}
        run: |
          set -euo pipefail

          : "${ACR_NAME:?Configure AZURE_ACR_NAME nas variaveis do ambiente GitHub.}"

          az acr build \
            --registry "$ACR_NAME" \
            --image "$SERVICE:$TAG" \
            --image "$SERVICE:${{ needs.detect.outputs.target_environment }}-latest" \
            --build-arg "SWAGGER_UI_ENABLED=${SWAGGER_UI_ENABLED:-true}" \
            --file "$SERVICE/src/main/docker/Dockerfile.jvm" \
            "$SERVICE"

      - name: Update Azure Container App
        env:
          ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          : "${ACR_NAME:?Configure AZURE_ACR_NAME nas variaveis do ambiente GitHub.}"
          : "${RESOURCE_GROUP:?Configure AZURE_RESOURCE_GROUP nas variaveis do ambiente GitHub.}"

          az containerapp update \
            --name "$SERVICE" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$SERVICE:$TAG"

      - name: Gateway health check
        if: matrix.service == 'gateway-api'
        env:
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          fqdn="$(az containerapp show \
            --name "$SERVICE" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)"

          if [[ -n "$fqdn" ]]; then
            curl --fail --show-error --silent --retry 10 --retry-delay 10 "https://$fqdn/q/health/ready"
          fi
