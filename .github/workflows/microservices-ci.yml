name: microservices-ci

on:
  pull_request:
    paths:
      - ".github/workflows/microservices-ci.yml"
      - "docker-compose.yml"
      - "pom.xml"
      - ".env.example"
      - "observability/**"
      - "scripts/**"
      - "gateway-api/**"
      - "core-service/**"
      - "billing-service/**"
      - "notification-service/**"
      - "reporting-service/**"
      - "user-service/**"
      - "auth-service/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/microservices-ci.yml"
      - "docker-compose.yml"
      - "pom.xml"
      - ".env.example"
      - "observability/**"
      - "scripts/**"
      - "gateway-api/**"
      - "core-service/**"
      - "billing-service/**"
      - "notification-service/**"
      - "reporting-service/**"
      - "user-service/**"
      - "auth-service/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: microservices-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-api
          - core-service
          - billing-service
          - notification-service
          - reporting-service
          - user-service
          - auth-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Verify service
        run: ./mvnw -B -ntp verify

      - name: Build container image
        run: docker build -f src/main/docker/Dockerfile.jvm -t brasaller/${{ matrix.service }}:${{ github.sha }} .
