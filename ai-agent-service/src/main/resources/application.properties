# ─── HTTP ────────────────────────────────────────────────────────────────────
quarkus.http.port=${HTTP_PORT:8086}
quarkus.http.host=0.0.0.0

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,X-Internal-Token,X-Tenant-Id,X-Request-Id
quarkus.http.cors.exposed-headers=Content-Disposition

# ─── DATABASE ─────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:ai-agent-service}
quarkus.datasource.password=${DB_PASSWORD:password}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/ai-agent-service}
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# ─── FLYWAY ───────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ─── JWT (verificacao de tokens emitidos pelo auth-service) ───────────────────
ai.jwt.secret=${AI_JWT_SECRET:change-me-in-production-min-32-chars!!}
ai.jwt.issuer=${AI_JWT_ISSUER:brasaller-auth}

# ─── INTERNAL TOKEN (service-to-service) ──────────────────────────────────────
ai.internal-token=${AI_INTERNAL_TOKEN:change-internal-token}

# ─── LLM PROVIDERS ────────────────────────────────────────────────────────────
# Provider ativo: noop | openai | claude | gemini
ai.llm.provider=${AI_LLM_PROVIDER:noop}

# OpenAI
ai.llm.openai.api-key=${AI_LLM_OPENAI_API_KEY:not-configured}
ai.llm.openai.model=${AI_LLM_OPENAI_MODEL:gpt-4o-mini}
ai.llm.openai.timeout-seconds=${AI_LLM_OPENAI_TIMEOUT:30}

# Claude (Anthropic)
ai.llm.claude.api-key=${AI_LLM_CLAUDE_API_KEY:not-configured}
ai.llm.claude.model=${AI_LLM_CLAUDE_MODEL:claude-haiku-4-5-20251001}
ai.llm.claude.timeout-seconds=${AI_LLM_CLAUDE_TIMEOUT:30}

# ─── SERVICE CLIENTS (inter-service HTTP) ─────────────────────────────────────
ai.client.internal-token=${AI_INTERNAL_TOKEN:change-internal-token}
ai.client.auth-service.base-url=${AUTH_SERVICE_URL:http://auth-service:8080}
ai.client.user-service.base-url=${USER_SERVICE_URL:http://user-service:8080}
ai.client.core-service.base-url=${CORE_SERVICE_URL:http://core-service:8080}
ai.client.billing-service.base-url=${BILLING_SERVICE_URL:http://billing-service:8080}
ai.client.notification-service.base-url=${NOTIFICATION_SERVICE_URL:http://notification-service:8080}
ai.client.reporting-service.base-url=${REPORTING_SERVICE_URL:http://reporting-service:8080}

# ─── HEALTH / METRICS ─────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

# ─── SWAGGER / OPENAPI ────────────────────────────────────────────────────────
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:true}
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi

# ─── LOGGING ──────────────────────────────────────────────────────────────────
quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.json=${LOG_JSON:false}

# ─── DEV PROFILE ──────────────────────────────────────────────────────────────
%dev.quarkus.log.level=DEBUG
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ai-agent-service-dev
%dev.quarkus.swagger-ui.always-include=true
%dev.ai.llm.provider=noop

# ─── TEST PROFILE ─────────────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:ai_agent_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.flyway.migrate-at-start=true
%test.ai.jwt.secret=test-secret-min-32-chars-for-testing
%test.ai.internal-token=test-internal-token
%test.ai.llm.provider=noop
