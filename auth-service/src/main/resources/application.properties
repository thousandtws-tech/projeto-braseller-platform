# ─────────────────────────────────────────────────────────────────────────────────
# 📋 METADADOS DA APLICAÇÃO
# ─────────────────────────────────────────────────────────────────────────────────
# Identificação e versionamento do serviço. Essencial para rastreabilidade em ambientes distribuídos e logs centralizados.
# ─────────────────────────────────────────────────────────────────────────────────

# Nome canônico do serviço - usado em métricas, traces e service discovery
quarkus.application.name=auth-service

# Versão semântica - integra com CI/CD para rollback e auditoria
quarkus.application.version=1.0-SNAPSHOT


# ─────────────────────────────────────────────────────────────────────────────────
# 🌐 SERVIDOR HTTP & CONCORRÊNCIA
# ─────────────────────────────────────────────────────────────────────────────────
# Configurações de rede e limites de concorrência. Guardrails de alta concorrência previnem que clientes lentos e payloads grandes ocupem worker threads indefinidamente.
# ─────────────────────────────────────────────────────────────────────────────────

# Bind em todas interfaces - necessário para containers Docker/K8s
quarkus.http.host=0.0.0.0

# Porta principal - externalizável para orquestração
quarkus.http.port=${HTTP_PORT:8080}

# Porta isolada em dev para evitar conflito com outros serviços
%dev.quarkus.http.port=8085

# Porta 0 = alocação dinâmica - evita conflitos em CI paralelo
%test.quarkus.http.test-port=0

# Timeout de conexões ociosas - libera recursos de clientes abandonados
quarkus.http.idle-timeout=${HTTP_IDLE_TIMEOUT:30S}

# Limite de payload - proteção contra DoS via uploads grandes [SECURITY-SENSITIVE]
quarkus.http.limits.max-body-size=${HTTP_MAX_BODY_SIZE:2M}

# Graceful shutdown - tempo para drenar conexões antes de SIGKILL
quarkus.shutdown.timeout=${GRACEFUL_SHUTDOWN_TIMEOUT:30S}

# Pool de workers finito - torna pressão visível antes de sobrecarregar DB/downstream
quarkus.thread-pool.max-threads=${APP_MAX_WORKER_THREADS:32}


# ─────────────────────────────────────────────────────────────────────────────────
# 🗄️ DATASOURCE & CONNECTION POOL
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração do PostgreSQL com pool de conexões otimizado. Defaults intencionalmente modestos - prefira escala horizontal antes de aumentar o pool.
# ─────────────────────────────────────────────────────────────────────────────────

# Driver JDBC - PostgreSQL como padrão de produção
quarkus.datasource.db-kind=${DB_KIND:postgresql}

# Usuário dedicado por serviço - princípio do menor privilégio [SECURITY-CRITICAL]
quarkus.datasource.username=${DB_USERNAME:auth-service}

# Senha de desenvolvimento - NUNCA usar em produção [SECURITY-CRITICAL]
quarkus.datasource.password=${DB_PASSWORD:npg_vGApqu8Y0gfB}

# Produção EXIGE variável de ambiente - sem fallback [SECURITY-CRITICAL]
%prod.quarkus.datasource.password=${DB_PASSWORD:npg_vGApqu8Y0gfB}

# Connection string completa - inclui host, porta e database
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://ep-flat-meadow-ap1zpfr6-pooler.c-7.us-east-1.aws.neon.tech/auth-service-database?user=auth-service&password=npg_vGApqu8Y0gfB&sslmode=require&channelBinding=require}

# Conexões mínimas - aquecidas para latência consistente em cold start
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}

# Máximo de conexões - ajustar após analisar wait time, CPU do DB e p95 latency
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}

# Timeout para obter conexão - fail fast se pool esgotado
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}

# Validação assíncrona de conexões - detecta conexões mortas
quarkus.datasource.jdbc.background-validation-interval=${DB_BACKGROUND_VALIDATION_INTERVAL:2M}

# Remoção de conexões ociosas - libera recursos do DB
quarkus.datasource.jdbc.idle-removal-interval=${DB_IDLE_REMOVAL_INTERVAL:5M}

# Vida máxima da conexão - evita memory leaks e stale connections
quarkus.datasource.jdbc.max-lifetime=${DB_MAX_LIFETIME:30M}

# Health check do datasource - integra com /q/health/ready
quarkus.datasource.health.enabled=true

# Métricas do pool - essencial para troubleshooting de performance
quarkus.datasource.metrics.enabled=true


# ─────────────────────────────────────────────────────────────────────────────────
# 🧪 DATASOURCE (PERFIL TEST)
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração H2 in-memory para testes unitários e integração. Modo PostgreSQL garante compatibilidade SQL.
# ─────────────────────────────────────────────────────────────────────────────────

# H2 in-memory - rápido, isolado, sem dependências externas
%test.quarkus.datasource.db-kind=h2

# Usuário padrão H2
%test.quarkus.datasource.username=sa

# Senha padrão H2 - aceitável apenas em testes
%test.quarkus.datasource.password=sa

# MODE=PostgreSQL emula sintaxe PG - DB_CLOSE_DELAY=-1 mantém dados durante a suite
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:auth_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1

# Pool mínimo para testes - recursos limitados em CI
%test.quarkus.datasource.jdbc.min-size=1

# Pool pequeno - suficiente para testes paralelos moderados
%test.quarkus.datasource.jdbc.max-size=4

# Desabilita Testcontainers - usa H2 explícito acima
%test.quarkus.datasource.devservices.enabled=false


# ─────────────────────────────────────────────────────────────────────────────────
# 🔄 FLYWAY MIGRATIONS
# ─────────────────────────────────────────────────────────────────────────────────
# Gestão de schema versionada. Migrations automáticas no startup com validação obrigatória.
# ─────────────────────────────────────────────────────────────────────────────────

# Auto-migrate no boot - desabilitar em blue/green com migrations separadas
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}

# Valida checksums - detecta alterações não autorizadas em migrations
quarkus.flyway.validate-on-migrate=true
%prod.quarkus.flyway.ignore-migration-patterns=*:missing

# CRÍTICO: Impede flyway:clean acidental - proteção contra perda de dados [SECURITY-CRITICAL]
quarkus.flyway.clean-disabled=true

# Diretório das migrations - convenção classpath:db/migration
quarkus.flyway.locations=db/migration


# ─────────────────────────────────────────────────────────────────────────────────
# 🔐 JWT & TOKENS
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração de tokens JWT para autenticação stateless. Secrets devem ter mínimo 32 bytes para HMAC-SHA256.
# ─────────────────────────────────────────────────────────────────────────────────

# Claim "iss" - identifica o emissor do token
auth.jwt.issuer=${AUTH_JWT_ISSUER:brasaller-auth}

# Claim "aud" - serviços que devem aceitar este token
auth.jwt.audience=${AUTH_JWT_AUDIENCE:brasaller-platform}

# HMAC secret - OBRIGATÓRIO trocar em produção (mín 256 bits) [SECURITY-CRITICAL]
auth.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}

# Produção sem fallback - força configuração explícita [SECURITY-CRITICAL]
%prod.auth.jwt.secret=${AUTH_JWT_SECRET}

# TTL de 15min - balança UX vs segurança (refresh token para renovação)
auth.jwt.access-token-ttl-seconds=${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}


# ─────────────────────────────────────────────────────────────────────────────────
# 🛡️ AUTHENTICATION (LOCAL)
# ─────────────────────────────────────────────────────────────────────────────────
# Keycloak integration removed - using native authentication
# ─────────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────────
# 🔗 COMUNICAÇÃO INTER-SERVIÇOS
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração de clientes HTTP para comunicação com outros microserviços da plataforma.
# ─────────────────────────────────────────────────────────────────────────────────

# URL do User Service - discovery via service mesh em K8s
auth.user-service.url=${USER_SERVICE_URL:http://localhost:8084}

# Token para autenticação service-to-service (mTLS preferível) [SECURITY-CRITICAL]
auth.user-service.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}

# Obrigatório em produção [SECURITY-CRITICAL]
%prod.auth.user-service.internal-token=${INTERNAL_SERVICE_TOKEN}

# Timeout de conexão TCP - fail fast se serviço down
auth.http-client.connect-timeout-ms=${AUTH_HTTP_CONNECT_TIMEOUT_MS:3000}

# Timeout total da request - inclui tempo de resposta do servidor
auth.http-client.request-timeout-ms=${AUTH_HTTP_REQUEST_TIMEOUT_MS:8000}


# ─────────────────────────────────────────────────────────────────────────────────
# 🌍 CORS (CROSS-ORIGIN)
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração de Cross-Origin Resource Sharing para permitir chamadas de frontends em domínios diferentes.
# ─────────────────────────────────────────────────────────────────────────────────

# Habilita CORS - necessário para SPAs em domínios separados
quarkus.http.cors.enabled=true

# Origins permitidas - NUNCA usar * em produção [SECURITY-SENSITIVE]
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080,https://aistudio.google.com,https://dreamy-malasada-560148.netlify.app}

# Métodos HTTP permitidos - OPTIONS para preflight
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS

# Headers permitidos - incluir custom headers da aplicação
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id

# Headers expostos ao JS - necessário para leitura no frontend
quarkus.http.cors.exposed-headers=location,x-request-id


# ─────────────────────────────────────────────────────────────────────────────────
# 📖 OPENAPI & SWAGGER
# ─────────────────────────────────────────────────────────────────────────────────
# Documentação automática da API via SmallRye OpenAPI. Swagger UI habilitado apenas em dev/test.
# ─────────────────────────────────────────────────────────────────────────────────

# Endpoint do spec OpenAPI (JSON/YAML)
quarkus.smallrye-openapi.path=/q/openapi

# Título exibido na documentação
quarkus.smallrye-openapi.info-title=BraSeller Auth Service API

# Versão da API - sincronizar com releases
quarkus.smallrye-openapi.info-version=1.0.0

# Descrição para desenvolvedores consumidores
quarkus.smallrye-openapi.info-description=API de autenticacao, sessoes, JWT e OAuth do BraSeller.

# Swagger UI em produção - desabilitado por segurança
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}

# Habilitado em desenvolvimento
%dev.quarkus.swagger-ui.always-include=true

# Habilitado em testes
%test.quarkus.swagger-ui.always-include=true


# ─────────────────────────────────────────────────────────────────────────────────
# 📊 MÉTRICAS & OBSERVABILIDADE
# ─────────────────────────────────────────────────────────────────────────────────
# Exportação de métricas Prometheus via Micrometer. Essencial para dashboards e alertas.
# ─────────────────────────────────────────────────────────────────────────────────

# Endpoint Prometheus - scrape target para Prometheus/Grafana
quarkus.micrometer.export.prometheus.path=/q/metrics

# Métricas HTTP automáticas - latência, status codes, throughput
quarkus.micrometer.binder.http-server.enabled=true


# ─────────────────────────────────────────────────────────────────────────────────
# 📝 LOGGING & AUDITORIA
# ─────────────────────────────────────────────────────────────────────────────────
# Configuração de logs estruturados. JSON em produção para integração com ELK/Loki.
# ─────────────────────────────────────────────────────────────────────────────────

# Nível global - DEBUG temporário para troubleshooting
quarkus.log.level=${LOG_LEVEL:INFO}

# Nível do código da aplicação - isolado de libs
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}

# JSON logs - legível em dev, estruturado em prod
quarkus.log.console.json.enabled=${LOG_JSON:false}

# JSON obrigatório em produção - parseable por log aggregators
%prod.quarkus.log.console.json.enabled=true

# Access logs HTTP - útil para debug de requests
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}

# Habilitado em prod para auditoria e análise
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}

# Desabilitado em testes - reduz ruído
%test.quarkus.http.access-log.enabled=false


# ─────────────────────────────────────────────────────────────────────────────────
# 🛠️ FERRAMENTAS DE DESENVOLVIMENTO
# ─────────────────────────────────────────────────────────────────────────────────
# Configurações específicas para modo de desenvolvimento do Quarkus.
# ─────────────────────────────────────────────────────────────────────────────────

# Desabilita monitoring CDI - reduz overhead em dev mode
quarkus.arc.dev-mode.monitoring-enabled=false


# ─────────────────────────────────────────────────────────────────────────────────
# 🔄 FAULT TOLERANCE (SmallRye)
# ─────────────────────────────────────────────────────────────────────────────────
# Thresholds externalizados via variáveis de ambiente. Sobrescreve os valores
# definidos nas anotações @Retry/@CircuitBreaker sem recompilar.
# ─────────────────────────────────────────────────────────────────────────────────

# User Service Gateway — retry e circuit breaker
com.example.infrastructure.client.HttpUserIdentityGateway/verifyPassword/Retry/maxRetries=${AUTH_USER_GW_RETRY_MAX:2}
com.example.infrastructure.client.HttpUserIdentityGateway/verifyPassword/CircuitBreaker/delay=${AUTH_USER_GW_CB_DELAY_MS:30000}
com.example.infrastructure.client.HttpUserIdentityGateway/syncExternalProfile/Retry/maxRetries=${AUTH_USER_GW_RETRY_MAX:2}
com.example.infrastructure.client.HttpUserIdentityGateway/registerTenant/CircuitBreaker/delay=${AUTH_USER_GW_CB_DELAY_MS:30000}

# Desabilita FT não-fallback em testes para evitar atrasos nos mocks
%test.MP_Fault_Tolerance_NonFallback_Enabled=false

# Auth transactional challenges
auth.challenges.code-secret=${AUTH_CHALLENGE_CODE_SECRET:${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}}
auth.challenges.email-verification-ttl-minutes=${AUTH_EMAIL_VERIFICATION_TTL_MINUTES:15}
auth.challenges.password-reset-ttl-minutes=${AUTH_PASSWORD_RESET_TTL_MINUTES:30}
auth.challenges.max-attempts=${AUTH_CHALLENGE_MAX_ATTEMPTS:5}
auth.challenges.request-window-minutes=${AUTH_CHALLENGE_REQUEST_WINDOW_MINUTES:15}
auth.challenges.max-requests-per-window=${AUTH_CHALLENGE_MAX_REQUESTS_PER_WINDOW:3}
auth.challenges.fixed-code=${AUTH_CHALLENGE_FIXED_CODE:}
%test.auth.challenges.fixed-code=123456

auth.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8083}
auth.notification-service.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
%prod.auth.notification-service.internal-token=${INTERNAL_SERVICE_TOKEN}


