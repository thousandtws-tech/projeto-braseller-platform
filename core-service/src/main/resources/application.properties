quarkus.application.name=core-service
quarkus.application.version=1.0-SNAPSHOT

quarkus.http.host=0.0.0.0
quarkus.http.port=${HTTP_PORT:8080}
%dev.quarkus.http.port=8081
%test.quarkus.http.test-port=0

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:core_service}
quarkus.datasource.password=${DB_PASSWORD:core_service_password}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5433/core_service}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}
quarkus.datasource.health.enabled=true
quarkus.datasource.metrics.enabled=true
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=db/migration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:core_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.min-size=1
%test.quarkus.datasource.jdbc.max-size=4
%test.quarkus.datasource.devservices.enabled=false

core.jwt.issuer=${AUTH_JWT_ISSUER:brasaller-auth}
core.jwt.audience=${AUTH_JWT_AUDIENCE:brasaller-platform}
core.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}

mp.messaging.connector.smallrye-kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap.servers:localhost:9092}}
mp.messaging.outgoing.new-sale-events-out.connector=smallrye-kafka
mp.messaging.outgoing.new-sale-events-out.topic=${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE:brasaller.notifications.new-sale.v1}
mp.messaging.outgoing.new-sale-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.new-sale-events-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
mp.messaging.outgoing.new-sale-events-out.acks=all
mp.messaging.outgoing.new-sale-events-out.enable.idempotence=true
mp.messaging.outgoing.new-sale-events-out.retries=10

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080,https://aistudio.google.com}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id
quarkus.http.cors.exposed-headers=location,x-request-id

quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.filter=com.example.interfaces.rest.OpenApiSecurityFilter
quarkus.smallrye-openapi.info-title=BraSeller Core Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de contexto tenant-aware e contratos compartilhados do BraSeller.
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=${LOG_JSON:false}
%prod.quarkus.log.console.json.enabled=true
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
%test.quarkus.http.access-log.enabled=false
