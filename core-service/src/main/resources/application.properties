quarkus.application.name=core-service
quarkus.application.version=1.0-SNAPSHOT

quarkus.http.host=0.0.0.0
quarkus.http.port=${HTTP_PORT:8080}
%dev.quarkus.http.port=8081
%test.quarkus.http.test-port=0

# High-concurrency guardrails: bounded requests prevent slow clients and large bodies
# from occupying worker threads indefinitely. Tune per instance, not globally by habit.
quarkus.http.idle-timeout=${HTTP_IDLE_TIMEOUT:30S}
quarkus.http.limits.max-body-size=${HTTP_MAX_BODY_SIZE:2M}
quarkus.shutdown.timeout=${GRACEFUL_SHUTDOWN_TIMEOUT:30S}
# JDBC and marketplace HTTP calls are blocking; keep workers finite so pressure is
# visible before the database or external APIs are overwhelmed.
quarkus.thread-pool.max-threads=${APP_MAX_WORKER_THREADS:32}

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:core-service}
quarkus.datasource.password=${DB_PASSWORD:npg_qcFA3a2hplyM}
%prod.quarkus.datasource.password=${DB_PASSWORD:npg_qcFA3a2hplyM}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://ep-flat-meadow-ap1zpfr6-pooler.c-7.us-east-1.aws.neon.tech/core-service-database?user=core-service&password=npg_qcFA3a2hplyM&sslmode=require&channelBinding=require}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}
quarkus.datasource.jdbc.background-validation-interval=${DB_BACKGROUND_VALIDATION_INTERVAL:2M}
quarkus.datasource.jdbc.idle-removal-interval=${DB_IDLE_REMOVAL_INTERVAL:5M}
quarkus.datasource.jdbc.max-lifetime=${DB_MAX_LIFETIME:30M}
quarkus.datasource.health.enabled=true
quarkus.datasource.metrics.enabled=true
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=db/migration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:core_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.min-size=1
%test.quarkus.datasource.jdbc.max-size=4
%test.quarkus.datasource.devservices.enabled=false

core.jwt.issuer=${AUTH_JWT_ISSUER:brasaller-auth}
core.jwt.audience=${AUTH_JWT_AUDIENCE:brasaller-platform}
core.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}
%prod.core.jwt.secret=${AUTH_JWT_SECRET}
core.connector-token-encryption-key=${CONNECTOR_TOKEN_ENCRYPTION_KEY:dev-only-connector-token-encryption-key-change-me}
%prod.core.connector-token-encryption-key=${CONNECTOR_TOKEN_ENCRYPTION_KEY}

mercadolivre.api.base-url=${MERCADOLIVRE_API_BASE_URL:https://api.mercadolibre.com}
mercadolivre.api.connect-timeout-ms=${MERCADOLIVRE_CONNECT_TIMEOUT_MS:5000}
mercadolivre.api.request-timeout-ms=${MERCADOLIVRE_REQUEST_TIMEOUT_MS:15000}
mercadolivre.oauth.client-id=${MERCADOLIVRE_CLIENT_ID:4587994283757685}
mercadolivre.oauth.client-secret=${MERCADOLIVRE_CLIENT_SECRET:HbUfUI8lVHafO3klXPVTx1VIdWflaJRe}
mercadolivre.oauth.redirect-uri=${MERCADOLIVRE_REDIRECT_URI:https://gateway-api.salmonrock-4d3f2812.brazilsouth.azurecontainerapps.io/integrations/mercado-livre/callback}
mercadolivre.oauth.refresh-skew-seconds=${MERCADOLIVRE_REFRESH_SKEW_SECONDS:300}
%test.mercadolivre.oauth.client-id=
%test.mercadolivre.oauth.client-secret=

core.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
%prod.core.internal-token=${INTERNAL_SERVICE_TOKEN}
quarkus.rest-client.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8083}
quarkus.rest-client.notification-service.connect-timeout=${NOTIFICATION_SERVICE_CONNECT_TIMEOUT_MS:2000}
quarkus.rest-client.notification-service.read-timeout=${NOTIFICATION_SERVICE_READ_TIMEOUT_MS:10000}
quarkus.rest-client.reporting-service.url=${REPORTING_SERVICE_URL:http://localhost:8087}
quarkus.rest-client.reporting-service.connect-timeout=${REPORTING_SERVICE_CONNECT_TIMEOUT_MS:2000}
quarkus.rest-client.reporting-service.read-timeout=${REPORTING_SERVICE_READ_TIMEOUT_MS:10000}

messaging.outbox.dispatch-every=${MESSAGING_OUTBOX_DISPATCH_EVERY:5s}
messaging.outbox.batch-size=${MESSAGING_OUTBOX_BATCH_SIZE:50}
messaging.outbox.max-attempts=${MESSAGING_OUTBOX_MAX_ATTEMPTS:10}
messaging.outbox.retry-delay-seconds=${MESSAGING_OUTBOX_RETRY_DELAY_SECONDS:30}
messaging.outbox.in-flight-timeout-seconds=${MESSAGING_OUTBOX_IN_FLIGHT_TIMEOUT_SECONDS:300}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080,https://aistudio.google.com}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id
quarkus.http.cors.exposed-headers=location,x-request-id

quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.filter=com.example.interfaces.rest.OpenApiSecurityFilter
quarkus.smallrye-openapi.info-title=BraSeller Core Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de contexto tenant-aware e contratos compartilhados do BraSeller.
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=${LOG_JSON:false}
%prod.quarkus.log.console.json.enabled=true
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
%test.quarkus.http.access-log.enabled=false
