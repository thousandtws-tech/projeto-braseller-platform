# Reporting Service REST Client — retry e circuit breaker
com.example.infrastructure.client.ReportingRestClient/ingest/Retry/maxRetries=${CORE_REPORT_RETRY_MAX:2}
com.example.infrastructure.client.ReportingRestClient/ingest/CircuitBreaker/delay=${CORE_REPORT_CB_DELAY_MS:30000}

# Desabilita FT não-fallback em testes para evitar atrasos nos mocks
%test.MP_Fault_Tolerance_NonFallback_Enabled=false
