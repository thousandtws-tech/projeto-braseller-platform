quarkus.application.name=gateway-api
quarkus.application.version=1.0-SNAPSHOT

quarkus.http.host=localhost
quarkus.http.port=${HTTP_PORT:8080}
%dev.quarkus.http.port=8080
%test.quarkus.http.test-port=0

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=gateway-api
quarkus.datasource.password=npg_5iFwoEuXtK8M
quarkus.datasource.jdbc.url=jdbc:postgresql://ep-flat-meadow-ap1zpfr6-pooler.c-7.us-east-1.aws.neon.tech/gateway-api-database?user=gateway-api&password=npg_5iFwoEuXtK8M&sslmode=require&channelBinding=require
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}
quarkus.datasource.health.enabled=true
quarkus.datasource.metrics.enabled=true
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=db/migration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:gateway_api;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.min-size=1
%test.quarkus.datasource.jdbc.max-size=4
%test.quarkus.datasource.devservices.enabled=false

gateway.services.auth.url=${AUTH_SERVICE_URL:http://localhost:8085}
gateway.services.user.url=${USER_SERVICE_URL:http://localhost:8084}
gateway.services.core.url=${CORE_SERVICE_URL:http://localhost:8081}
gateway.services.billing.url=${BILLING_SERVICE_URL:http://localhost:8082}
gateway.services.notification.url=${NOTIFICATION_SERVICE_URL:http://localhost:8083}
gateway.services.reporting.url=${REPORTING_SERVICE_URL:http://localhost:8087}

quarkus.rest-client.gateway-downstream.url=${GATEWAY_DOWNSTREAM_DEFAULT_URL:http://localhost:8080}
quarkus.rest-client.gateway-downstream.connect-timeout=${GATEWAY_DOWNSTREAM_CONNECT_TIMEOUT_MS:2000}
quarkus.rest-client.gateway-downstream.read-timeout=${GATEWAY_DOWNSTREAM_READ_TIMEOUT_MS:30000}
quarkus.rest-client.gateway-downstream.disable-default-mapper=true
org.eclipse.microprofile.rest.client.propagateHeaders=Authorization,X-Tenant-Id,X-Request-Id,Accept,Content-Type,X-Billing-Webhook-Token

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id,x-billing-webhook-token
quarkus.http.cors.exposed-headers=location,x-request-id,content-disposition,x-report-filename

quarkus.smallrye-openapi.path=/q/openapi
quarkus.smallrye-openapi.info-title=BraSeller Gateway API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Gateway HTTP para acesso aos microservices do sistema BraSeller.
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
quarkus.swagger-ui.title=BraSeller APIs
quarkus.swagger-ui.urls-primary-name=Gateway
quarkus.swagger-ui.urls.Gateway=/q/openapi
quarkus.swagger-ui.urls.Auth=${AUTH_SERVICE_OPENAPI_URL:http://localhost:8085/q/openapi}
quarkus.swagger-ui.urls.User=${USER_SERVICE_OPENAPI_URL:http://localhost:8084/q/openapi}
quarkus.swagger-ui.urls.Core=${CORE_SERVICE_OPENAPI_URL:http://localhost:8081/q/openapi}
quarkus.swagger-ui.urls.Billing=${BILLING_SERVICE_OPENAPI_URL:http://localhost:8082/q/openapi}
quarkus.swagger-ui.urls.Notification=${NOTIFICATION_SERVICE_OPENAPI_URL:http://localhost:8083/q/openapi}
quarkus.swagger-ui.urls.Reporting=${REPORTING_SERVICE_OPENAPI_URL:http://localhost:8087/q/openapi}
quarkus.swagger-ui.deep-linking=true
quarkus.swagger-ui.try-it-out-enabled=true
quarkus.swagger-ui.validator-url=none
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=${LOG_JSON:false}
%prod.quarkus.log.console.json.enabled=true
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
%test.quarkus.http.access-log.enabled=false
