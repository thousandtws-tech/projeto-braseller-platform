quarkus.application.name=notification-service
quarkus.application.version=1.0-SNAPSHOT

quarkus.http.host=0.0.0.0
quarkus.http.port=${HTTP_PORT:8080}
%dev.quarkus.http.port=8083
%test.quarkus.http.test-port=0

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:notification_service}
quarkus.datasource.password=${DB_PASSWORD:notification_service_password}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5435/notification_service}
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}
quarkus.datasource.health.enabled=true
quarkus.datasource.metrics.enabled=true
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=db/migration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:notification_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.min-size=1
%test.quarkus.datasource.jdbc.max-size=4
%test.quarkus.datasource.devservices.enabled=false

notification.mail.from=${NOTIFICATION_MAIL_FROM:no-reply@braseller.local}
notification.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
notification.jwt.issuer=${AUTH_JWT_ISSUER:brasaller-auth}
notification.jwt.audience=${AUTH_JWT_AUDIENCE:brasaller-platform}
notification.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}
notification.jobs.monthly-closing.cron=${NOTIFICATION_MONTHLY_CLOSING_CRON:0 0 8 1 * ?}
notification.jobs.ml-payment-release.cron=${NOTIFICATION_ML_PAYMENT_RELEASE_CRON:0 0/30 * * * ?}
notification.jobs.weekly-accountant-report.cron=${NOTIFICATION_WEEKLY_ACCOUNTANT_REPORT_CRON:0 0 8 ? * MON}

quarkus.mailer.from=${NOTIFICATION_MAIL_FROM:no-reply@braseller.local}
quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.username=${SMTP_USERNAME:}
quarkus.mailer.password=${SMTP_PASSWORD:}
quarkus.mailer.mock=${SMTP_MOCK:true}
%prod.quarkus.mailer.mock=${SMTP_MOCK:false}
%test.quarkus.mailer.mock=true

mp.messaging.connector.smallrye-kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap.servers:localhost:9092}}
mp.messaging.incoming.new-sale-events-in.connector=smallrye-kafka
mp.messaging.incoming.new-sale-events-in.topic=${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE:brasaller.notifications.new-sale.v1}
mp.messaging.incoming.new-sale-events-in.group.id=${KAFKA_NOTIFICATION_GROUP_ID:notification-service}
mp.messaging.incoming.new-sale-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.new-sale-events-in.value.deserializer=com.example.infrastructure.messaging.NewSaleEventDeserializer
mp.messaging.incoming.new-sale-events-in.auto.offset.reset=earliest
mp.messaging.incoming.new-sale-events-in.failure-strategy=dead-letter-queue
mp.messaging.incoming.new-sale-events-in.dead-letter-queue.topic=${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE_DLQ:brasaller.notifications.new-sale.dlq.v1}
mp.messaging.incoming.new-sale-events-in.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.new-sale-events-in.dead-letter-queue.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer
notification.kafka.topic.new-sale-summary=${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE_SUMMARY:brasaller.analytics.tenant-new-sale-summary.v1}

quarkus.kafka-streams.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap.servers:localhost:9092}}
quarkus.kafka-streams.application-id=${KAFKA_STREAMS_APPLICATION_ID:notification-service-new-sale-streams}
quarkus.kafka-streams.application-server=${KAFKA_STREAMS_APPLICATION_SERVER:localhost:8083}
quarkus.kafka-streams.topics=${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE:brasaller.notifications.new-sale.v1},${BRASALLER_KAFKA_TOPIC_NOTIFICATION_NEW_SALE_SUMMARY:brasaller.analytics.tenant-new-sale-summary.v1}
kafka-streams.auto.offset.reset=earliest
kafka-streams.processing.guarantee=at_least_once
kafka-streams.commit.interval.ms=1000
kafka-streams.statestore.cache.max.bytes=10240
kafka-streams.state.dir=${KAFKA_STREAMS_STATE_DIR:/tmp/kafka-streams}
%test.quarkus.kafka-streams.health.enabled=false

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080,https://aistudio.google.com}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id
quarkus.http.cors.exposed-headers=location,x-request-id

quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.filter=com.example.interfaces.rest.OpenApiSecurityFilter
quarkus.smallrye-openapi.info-title=BraSeller Notification Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de notificacoes, alertas e comunicacao com usuarios do BraSeller.
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=${LOG_JSON:false}
%prod.quarkus.log.console.json.enabled=true
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
%test.quarkus.http.access-log.enabled=false
