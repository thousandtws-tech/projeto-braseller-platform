global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway-api
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - gateway-api:8080

  - job_name: core-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - core-service:8080

  - job_name: billing-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - billing-service:8080

  - job_name: notification-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - notification-service:8080

  - job_name: reporting-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - reporting-service:8080

  - job_name: user-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - user-service:8080

  - job_name: auth-service
    metrics_path: /q/metrics
    static_configs:
      - targets:
          - auth-service:8080
