quarkus.application.name=user-service
quarkus.application.version=1.0-SNAPSHOT

quarkus.http.host=0.0.0.0
quarkus.http.port=${HTTP_PORT:8080}
%dev.quarkus.http.port=8084
%test.quarkus.http.test-port=0

# High-concurrency guardrails: bounded requests prevent slow clients and large bodies
# from occupying worker threads indefinitely. Tune per instance, not globally by habit.
quarkus.http.idle-timeout=${HTTP_IDLE_TIMEOUT:30S}
quarkus.http.limits.max-body-size=${HTTP_MAX_BODY_SIZE:2M}
quarkus.shutdown.timeout=${GRACEFUL_SHUTDOWN_TIMEOUT:30S}
# JDBC calls are blocking; keep workers finite so pressure is visible before the
# database is overwhelmed.
quarkus.thread-pool.max-threads=${APP_MAX_WORKER_THREADS:32}

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USERNAME:user-service}
quarkus.datasource.password=${DB_PASSWORD:npg_1pZUY3xJmoNe}
%prod.quarkus.datasource.password=${DB_PASSWORD:npg_1pZUY3xJmoNe}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://ep-flat-meadow-ap1zpfr6-pooler.c-7.us-east-1.aws.neon.tech/user-service-database?user=user-service&password=npg_1pZUY3xJmoNe&sslmode=require&channelBinding=require}
# Pool defaults are intentionally modest. Raise DB_POOL_MAX_SIZE only after checking
# datasource wait time, DB CPU, lock waits and p95 latency; prefer horizontal scale first.
quarkus.datasource.jdbc.min-size=${DB_POOL_MIN_SIZE:2}
quarkus.datasource.jdbc.max-size=${DB_POOL_MAX_SIZE:16}
quarkus.datasource.jdbc.acquisition-timeout=${DB_ACQUISITION_TIMEOUT:5S}
quarkus.datasource.jdbc.background-validation-interval=${DB_BACKGROUND_VALIDATION_INTERVAL:2M}
quarkus.datasource.jdbc.idle-removal-interval=${DB_IDLE_REMOVAL_INTERVAL:5M}
quarkus.datasource.jdbc.max-lifetime=${DB_MAX_LIFETIME:30M}
quarkus.datasource.health.enabled=true
quarkus.datasource.metrics.enabled=true
quarkus.flyway.migrate-at-start=${FLYWAY_MIGRATE_AT_START:true}
quarkus.flyway.validate-on-migrate=true
quarkus.flyway.clean-disabled=true
quarkus.flyway.locations=db/migration
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:user_service;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.jdbc.min-size=1
%test.quarkus.datasource.jdbc.max-size=4
%test.quarkus.datasource.devservices.enabled=false

# Redis and Cache
quarkus.redis.hosts=${REDIS_HOST:redis://localhost:6379}
quarkus.cache.type=redis
quarkus.cache.redis.user-members.expire-after-write=10M
quarkus.cache.redis.user-members.key-prefix=user-service:members:

# Logging & Observability
quarkus.log.category."io.quarkus.cache".level=DEBUG
quarkus.micrometer.binder.redis.enabled=true

user.internal-token=${INTERNAL_SERVICE_TOKEN:dev-internal-token-change-me}
%prod.user.internal-token=${INTERNAL_SERVICE_TOKEN}
user.jwt.issuer=${AUTH_JWT_ISSUER:brasaller-auth}
user.jwt.audience=${AUTH_JWT_AUDIENCE:brasaller-platform}
user.jwt.secret=${AUTH_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum}
%prod.user.jwt.secret=${AUTH_JWT_SECRET}

# Keycloak Admin API — criacao de usuarios contador via Admin REST API
# Deixe KEYCLOAK_ADMIN_USERNAME e KEYCLOAK_ADMIN_PASSWORD vazios para desativar
# (o usuario sera criado apenas localmente com status INVITED)
user.keycloak.admin.url=${KEYCLOAK_ADMIN_URL:https://keycloak-production-96de.up.railway.app}
user.keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:brasaller}
user.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
user.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:zrjd7p2iv807unxq84isypspq8rxcoj5}

user.company-lookup.cnpj.base-url=${COMPANY_LOOKUP_CNPJ_BASE_URL:https://brasilapi.com.br/api/cnpj/v1}
user.company-lookup.timeout-ms=${COMPANY_LOOKUP_TIMEOUT_MS:5000}

quarkus.rest-client.core-service.url=${CORE_SERVICE_URL:http://localhost:8081}
quarkus.rest-client.core-service.connect-timeout=${CORE_SERVICE_CONNECT_TIMEOUT_MS:2000}
quarkus.rest-client.core-service.read-timeout=${CORE_SERVICE_READ_TIMEOUT_MS:10000}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080,https://aistudio.google.com}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-request-id,x-tenant-id
quarkus.http.cors.exposed-headers=location,x-request-id

quarkus.smallrye-openapi.path=/q/openapi
mp.openapi.filter=com.example.interfaces.rest.OpenApiSecurityFilter
quarkus.smallrye-openapi.info-title=BraSeller User Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de tenants, usuarios, papeis e acesso de contador do BraSeller.
quarkus.swagger-ui.always-include=${SWAGGER_UI_ENABLED:false}
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true

quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

quarkus.log.level=${LOG_LEVEL:INFO}
quarkus.log.category."com.example".level=${APP_LOG_LEVEL:INFO}
quarkus.log.console.json.enabled=${LOG_JSON:false}
%prod.quarkus.log.console.json.enabled=true
quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:false}
%prod.quarkus.http.access-log.enabled=${HTTP_ACCESS_LOG_ENABLED:true}
%test.quarkus.http.access-log.enabled=false
