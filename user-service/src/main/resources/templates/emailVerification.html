<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Codigo de verificacao Brasaller</title>
</head>
<body style="font-family: Arial, sans-serif; color: #111827; background: #f9fafb; padding: 24px;">
  <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 32px;">
    <p style="margin: 0 0 12px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #6b7280;">Brasaller</p>
    <h1 style="margin: 0 0 16px; font-size: 24px;">Verifique seu e-mail</h1>
    <p style="margin: 0 0 24px; line-height: 1.6;">
      Ola {name}, use o codigo abaixo para concluir a criacao da sua conta com o e-mail {email}.
    </p>
    <div style="margin: 0 0 24px; padding: 18px 20px; border-radius: 12px; background: #111827; color: #ffffff; font-size: 30px; font-weight: 700; letter-spacing: 0.24em; text-align: center;">
      {code}
    </div>
    <p style="margin: 0; line-height: 1.6; color: #4b5563;">
      O codigo expira em {expiresAt}. Se voce nao solicitou este cadastro, ignore esta mensagem.
    </p>
  </div>
</body>
</html>
